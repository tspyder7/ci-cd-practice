name: test-action-generator

on:
  workflow_dispatch:
  push:
    branches:
      - test/action-generator

jobs:
  test-1:
    runs-on: ubuntu-latest
    steps:
      - name: start-test
        id: start
        run: |
          echo "🤖: Test-1 Started"

      - name: test-1 details
        id: td-1
        run: |
          echo "Calling action-generator to generate publish action at runtime"

      - name: call action-generator
        id: test-1
        uses: tspyder7/github-actions-lib/.github/actions/action-generator@feat/action-generator
        with:
          action-type: publish
          uses: tspyder7/github-actions-lib/.github/actions/sleep-for-while@feat/action-generator

      - name: log publish action
        run: cat .github/actions/publish/action.yml

      - name: execute-publish action
        uses: ./.github/actions/publish/
      
      - name: end-test
        id: end
        run: |
          echo "🤖: Test-1 Completed"

  test-2:
    runs-on: ubuntu-latest
    needs: test-1
    steps:
      - name: start-test
        id: start
        run: |
          echo "🤖: Test-2 Started"

      - name: test-2 details
        id: td-2
        run: |
          echo "Calling sleep-for-while without params"

      - name: call sleep-for-while with params
        id: test-2
        uses: tspyder7/github-actions-lib/.github/actions/action-generator@feat/action-generator
        with:
          action-type: publish
          uses: tspyder7/github-actions-lib/.github/actions/sleep-for-while@feat/action-generator
          with: |
            {
              "sleep_time": 15
              "message": "Test-2: I waited for 15 sec"
            }

      - name: log publish action
        run: cat .github/actions/publish/action.yml

      - name: execute-publish action
        uses: ./.github/actions/publish/

      - name: end-test
        id: end
        run: |
          echo "🤖: Test-2 Completed"
