name: Test Custom Timeout Caller

on:
  push:
    branches:
      - test/release-pipeline
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (rc, alpha, beta, latest)"
        type: string
        default: latest

jobs:
  release:
    uses: your-org/github-actions-lib/.github/workflows/release-pipeline.yml@main
    with:
      environment: production
      release-type: ${{ inputs.release-type }}
      publish: |
        {
          "uses": "tspyder7/github-actions-lib/actions/sleep-for-while@main@feat/release-pipeline",
          "with": {
            "sleep_time": "10",
            "message": "Slept for 10 seconds. Release is complete"
          }
        }
